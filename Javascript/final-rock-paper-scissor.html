<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="styles/rock-paper-scissor.css">
    <style>
        
    </style>
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    
    <button onclick="playGame('rock')" class="move-button">
        <img src="images/rock-emoji.png" class="move-item">
    </button>
    <button onclick="playGame('paper')" class="move-button">
        <img src="images/paper-emoji.png" class="move-item">
    </button>
    <button onclick="playGame('scissors')" class="move-button">
        <img src="images/scissors-emoji.png" class="move-item">
    </button>
    
    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="resetScore()" class="reset-score-button">Reset Score</button>

    <script src="10-rock-paper-scissor.js"></script>
</body>
</html>
