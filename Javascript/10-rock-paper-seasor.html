<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles/rock-paper-scissor.css">
    <title>Rock-Paper-Scissors</title>
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    
    <button onclick="playGame('rock')" class="move-button"><img src="images/rock-emoji.png" class="move-item"></button>
    <button onclick="playGame('paper')"class="move-button"><img src="images/paper-emoji.png" class="move-item"></button>
    <button onclick="playGame('scissors')"class="move-button"><img src="images/scissors-emoji.png" class="move-item"></button>
    
    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>
    <p ></p>
    <button onclick="
        score.wins = 0; 
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');  
        document.querySelector('.js-score').innerHTML = 
            `Win: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        UpdateScoreElement();
    " class="reset-score-button">Reset Button</button>

    <script src="scripts/10-rock-paper-scissor.js"></script>    
</body>
</html>
