<!-- Login and Signup Buttons -->
<div class="auth-buttons">
    <button class="login-btn" onclick="toggleModal('login')">Login</button>
    <button class="signup-btn" onclick="toggleModal('signup')">Sign Up</button>
</div>

<!-- Modal Forms -->
<div id="auth-modal" class="modal hidden">
    <div class="modal-content">
        <span class="close-btn" onclick="toggleModal()">&times;</span>

        <!-- Login Form -->
        <form id="login-form" class="auth-form hidden" onsubmit="return validateLogin(event)">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="auth-form hidden" onsubmit="return validateSignup(event)">
            <h2>Sign Up</h2>
            <input type="text" id="signup-name" placeholder="Name" required>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>
    </div>
</div>
